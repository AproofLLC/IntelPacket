name: Bug report
description: Report incorrect behavior, crashes, or spec violations in supported versions.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include a **minimal reproduction** when possible.
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@intelpacket/core"
        - "@intelpacket/pii"
        - "Monorepo / tooling"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version(s)
      description: npm package version(s) or git SHA
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
