name: Feature request
description: Suggest an enhancement that fits the project scope and constraints.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project intentionally avoids transport protocols, binary wire formats, ML/semantic engines, and blockchain features. Requests outside that scope may be declined.
  - type: dropdown
    id: package
    attributes:
      label: Primary package
      options:
        - "@intelpacket/core"
        - "@intelpacket/pii"
        - "Documentation / specs only"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
